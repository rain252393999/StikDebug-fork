name: Build Debug IPA
on:
  push:
    branches: [ "main", "semi-rewrite" ]
  pull_request:
    branches: [ "main", "semi-rewrite" ]
  workflow_dispatch:
permissions:
  contents: write  
jobs:
  build_and_release:
    name: Build & Release IPA
    runs-on: macos-latest  
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 26.0.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      # 🔥 修复核心：生成 Xcode 官方标准 XML 格式 plist
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>none</string>
          </dict>
          </plist>
          EOF

      - name: Build Archive
        run: |
          xcodebuild clean archive \
            -project StikDebug.xcodeproj \
            -scheme "StikDebug" \
            -configuration Debug \
            -archivePath build/StikDebug.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.4

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/StikDebug.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        if: env.UPLOAD_IPA == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-Debug.ipa
          path: "*.ipa"
          retention-days: 90

      - name: Get App Version
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' StikDebug.xcodeproj/project.pbxproj | head -1 | xargs)
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Nightly Release
        if: env.UPLOAD_IPA == 'true' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Nightly
          name: "Nightly Build - v${{ steps.version.outputs.app_version }}"
          prerelease: true
          body: "Built from commit ${{ github.sha }}"
          files: "*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
