name: Build Debug IPA
on:
  push:
    branches: [ "main", "semi-rewrite" ]
  workflow_dispatch:
permissions:
  contents: write  
jobs:
  build_and_release:
    name: Build & Release IPA
    runs-on: macos-latest  
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 26.0.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      # 安装证书：修复文件名格式
      - name: Install Enterprise Certificate
        run: |
          security create-keychain -p "123456" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "123456" build.keychain
          security import StikJIT/Scripts/A1.1.p12 -k build.keychain -P "${{ secrets.CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "123456" build.keychain

      # 安装描述文件
      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp StikJIT/Scripts/A1.2.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # 编译签名
      - name: Build & Sign Archive
        run: |
          xcodebuild clean archive \
            -project StikDebug.xcodeproj \
            -scheme "StikDebug" \
            -configuration Debug \
            -archivePath build/StikDebug.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            IPHONEOS_DEPLOYMENT_TARGET=17.4 \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}"

      # 导出企业IPA
      - name: Export Signed IPA
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>in-house</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath build/StikDebug.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        if: env.UPLOAD_IPA == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-Enterprise.ipa
          path: "*.ipa"
          retention-days: 90

      - name: Get Version
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' StikDebug.xcodeproj/project.pbxproj | head -1 | xargs)
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        if: env.UPLOAD_IPA == 'true' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Nightly
          name: "Nightly Build - v${{ steps.version.outputs.app_version }}"
          prerelease: true
          files: "*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
