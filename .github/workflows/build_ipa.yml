name: Build Debug IPA
on:
  push:
    branches: [ "main", "semi-rewrite" ]
  workflow_dispatch:
permissions:
  contents: write  
jobs:
  build_and_release:
    name: Build & Release IPA
    runs-on: macos-latest  
    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 26.0.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: Build App
        run: |
          xcodebuild clean archive \
            -project StikDebug.xcodeproj \
            -scheme "StikDebug" \
            -configuration Debug \
            -archivePath build/StikDebug.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.4

      # 无签名打包，TrollStore直接安装
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/StikDebug.xcarchive/Products/Applications/*.app Payload/
          zip -r StikDebug.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: upload-artifact@v4
        with:
          name: StikDebug.ipa
          path: "*.ipa"

      - name: Publish to Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CN-1
          name: "Nightly Build"
          files: "*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
