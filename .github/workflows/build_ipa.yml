name: Build Debug IPA
on:
  push:
    branches: [ "main", "semi-rewrite" ]
  workflow_dispatch:
permissions:
  contents: write  
jobs:
  build_and_release:
    name: Build & Release IPA
    runs-on: macos-latest  
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 26.0.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      # 🔥 修复：钥匙串密码 + 证书密码 全部匹配你的密码【1】
      - name: Install Enterprise Certificate
        run: |
          # 创建钥匙串（密码固定为1，极简无错误）
          security create-keychain -p "1" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "1" build.keychain
          # 导入证书：路径/文件名完全正确，密码=1
          security import StikJIT/Scripts/A1.p12 -k build.keychain -P "1" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "1" build.keychain

      # 安装描述文件（无修改，完全匹配你的文件）
      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp StikJIT/Scripts/A2.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # 编译签名
      - name: Build & Sign Archive
        run: |
          xcodebuild clean archive \
            -project StikDebug.xcodeproj \
            -scheme "StikDebug" \
            -configuration Debug \
            -archivePath build/StikDebug.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            IPHONEOS_DEPLOYMENT_TARGET=17.4 \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="2AYG7ZW6L5"

      # 导出企业IPA
      - name: Export Signed IPA
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>in-house</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath build/StikDebug.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-Enterprise.ipa
          path: "*.ipa"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Nightly
          name: "Nightly Build"
          files: "*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
